name: CI/CD

on:
  push:
    branches:
      - '**'
    tags: ['v*', 'v*.*.*', 'v*.*.*-rc*', 'v*.*.*-beta*', 'test-*']
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]
    branches: [main, master]
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      mode:
        type: choice
        default: build
        options: [lint-fix, build, release-major, release-minor, release-patch, release-test, release-rc, release-alpha, monthly-maintenance]
      release_version_override:
        type: string
        default: ''
      allow_prs:
        type: boolean
        default: true

permissions:
  contents: write
  pull-requests: write
  checks: write
  packages: write
  security-events: write
  pages: write
  id-token: write

jobs:
  route:
    name: Event Router
    runs-on: ubuntu-latest
    outputs:
      run_code_checks: ${{ steps.decide.outputs.run_code_checks }}
      run_build: ${{ steps.decide.outputs.run_build }}
      run_release: ${{ steps.decide.outputs.run_release }}
    steps:
      - id: decide
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" && "${{ github.event.action }}" == "closed" ]]; then
            echo "run_code_checks=false" >> "$GITHUB_OUTPUT"
            echo "run_build=false" >> "$GITHUB_OUTPUT"
            echo "run_release=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "run_code_checks=true" >> "$GITHUB_OUTPUT"

          if [[ "${{ github.ref }}" == refs/tags/* || ("${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.mode }}" != "lint-fix") ]]; then
            echo "run_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_build=false" >> "$GITHUB_OUTPUT"
          fi

          if [[ "${{ github.ref }}" == refs/tags/v* || ("${{ github.event_name }}" == "workflow_dispatch" && "${{ github.event.inputs.mode }}" == release*) ]]; then
            echo "run_release=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_release=false" >> "$GITHUB_OUTPUT"
          fi

  flutter-format:
    name: Flutter format (fast path)
    needs: [route]
    if: ${{ needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get

      - name: Check formatting
        id: format
        run: |
          dart format .
          if [[ -n $(git status --porcelain -- '*.dart') ]]; then
            echo "changes=true" >> "$GITHUB_OUTPUT"
            git status --porcelain -- '*.dart'
          else
            echo "changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create PR for formatting fixes
        if: steps.format.outputs.changes == 'true' && (github.event_name != 'workflow_dispatch' || github.event.inputs.allow_prs != 'false')
        uses: peter-evans/create-pull-request@v7
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "style: apply dart format"
          title: "style: apply dart format for ${{ github.head_ref || github.ref_name }}"
          body: "Automated PR to fix dart formatting issues."
          branch: "automated/dart-format-${{ github.head_ref || github.ref_name }}"
          base: ${{ github.head_ref || github.ref_name }}
          delete-branch: true

      - name: Fail if formatting issues existed
        if: steps.format.outputs.changes == 'true'
        run: |
          echo "Formatting issues detected. A PR has been created (if allowed) with the fixes."
          exit 1

  flutter-analyze:
    name: Flutter analyze (fast path)
    needs: [route]
    if: ${{ needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - run: flutter analyze

  flutter-test:
    name: Flutter test (fast path)
    needs: [route]
    if: ${{ needs.route.outputs.run_code_checks == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter --version
      - run: flutter pub get
      - run: flutter test

  build-linux:
    name: Build Linux
    needs: [route, flutter-format, flutter-analyze, flutter-test]
    if: ${{ needs.route.outputs.run_build == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev
          sudo apt-get install -y ruby ruby-dev rubygems build-essential
          sudo gem install --no-document fpm
          sudo apt-get install -y flatpak flatpak-builder libfuse2
      - run: flutter pub get
      - run: flutter build linux --release

      - name: Create Linux zip
        run: |
          cd build/linux/x64/release/bundle
          tar -czf ../../../../../mlocate_explorer-linux.tar.gz .

      - name: Build AppImage
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          mkdir -p AppDir/usr/bin
          mkdir -p AppDir/usr/share/applications
          mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
          cp -r build/linux/x64/release/bundle/* AppDir/usr/bin/

          cat << 'DESKTOP' > AppDir/usr/share/applications/mlocate_explorer.desktop
          [Desktop Entry]
          Type=Application
          Name=Mlocate Explorer
          Exec=mlocate_explorer
          Icon=mlocate_explorer
          Categories=Utility;
          DESKTOP

          cp assets/icon.png AppDir/usr/share/icons/hicolor/256x256/apps/mlocate_explorer.png
          cp assets/icon.png AppDir/mlocate_explorer.png
          cp AppDir/usr/share/applications/mlocate_explorer.desktop AppDir/

          cat << 'SCRIPT' > AppDir/AppRun
          #!/bin/sh
          HERE="$(dirname "$(readlink -f "${0}")")"
          exec "${HERE}/usr/bin/mlocate_explorer" "$@"
          SCRIPT
          chmod +x AppDir/AppRun

          export ARCH=x86_64
          APPIMAGE_EXTRACT_AND_RUN=1 ./appimagetool AppDir mlocate_explorer-x86_64.AppImage

      - name: Build DEB
        run: |
          fpm -s dir -t deb -n mlocate_explorer -v 1.0.0 --prefix /opt/mlocate_explorer build/linux/x64/release/bundle/=/opt/mlocate_explorer

      - name: Build RPM
        run: |
          sudo apt-get install -y rpm
          fpm -s dir -t rpm -n mlocate_explorer -v 1.0.0 --prefix /opt/mlocate_explorer build/linux/x64/release/bundle/=/opt/mlocate_explorer

      - name: Build APK
        run: |
          fpm -s dir -t apk -n mlocate_explorer -v 1.0.0 --prefix /opt/mlocate_explorer build/linux/x64/release/bundle/=/opt/mlocate_explorer
      - name: Build Pacman
        run: |
          sudo apt-get install -y libarchive-tools zstd
          fpm -s dir -t pacman -n mlocate_explorer -v 1.0.0 --prefix /opt/mlocate_explorer build/linux/x64/release/bundle/=/opt/mlocate_explorer

      - name: Build Flatpak
        run: |
          flatpak remote-add --user --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
          cat << 'FLATPAK' > mlocate_explorer.flatpak.yml
          app-id: com.example.mlocate_explorer
          runtime: org.freedesktop.Platform
          runtime-version: '24.08'
          sdk: org.freedesktop.Sdk
          command: mlocate_explorer
          modules:
            - name: mlocate_explorer
              buildsystem: simple
              build-commands:
                - mkdir -p /app/bin/
                - cp -r bundle/* /app/bin/
              sources:
                - type: dir
                  path: build/linux/x64/release/bundle
                  dest: bundle
          FLATPAK
          flatpak-builder --user --repo=repo --force-clean --install-deps-from=flathub build-dir mlocate_explorer.flatpak.yml
          flatpak build-bundle repo mlocate_explorer.flatpak com.example.mlocate_explorer

      - name: Clean build directory for Snapcraft
        run: rm -rf build/

      - name: Build Snap
        uses: snapcore/action-build@v1
        id: build-snap

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          retention-days: 1
          path: |
            mlocate_explorer-linux.tar.gz
            mlocate_explorer-x86_64.AppImage
            *.deb
            *.rpm
            *.apk
            *.flatpak
            *.snap
            *.pkg.tar.zst

  build-windows:
    name: Build Windows
    needs: [route, flutter-format, flutter-analyze, flutter-test]
    if: ${{ needs.route.outputs.run_build == 'true' }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build windows --release

      - name: Create Windows zip
        run: |
          Compress-Archive -Path build\windows\x64\runner\Release\* -DestinationPath mlocate_explorer-windows.zip

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          retention-days: 1
          path: mlocate_explorer-windows.zip

  build-macos:
    name: Build macOS
    needs: [route, flutter-format, flutter-analyze, flutter-test]
    if: ${{ needs.route.outputs.run_build == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build macos --release

      - name: Create macOS zip
        run: |
          cd build/macos/Build/Products/Release
          ditto -c -k --sequesterRsrc --keepParent mlocate_explorer.app ../../../../../mlocate_explorer-macos.zip

      - name: Build DMG
        run: |
          npm install -g appdmg
          appdmg appdmg.json mlocate_explorer.dmg

      - name: Build PKG
        run: |
          pkgbuild --component build/macos/Build/Products/Release/mlocate_explorer.app --install-location /Applications mlocate_explorer.pkg

      - name: Upload macOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-artifacts
          retention-days: 1
          path: |
            mlocate_explorer-macos.zip
            mlocate_explorer.dmg
            mlocate_explorer.pkg

  build-android:
    name: Build Android
    needs: [route, flutter-format, flutter-analyze, flutter-test]
    if: ${{ needs.route.outputs.run_build == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v3
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build apk --release
      - run: flutter build appbundle --release

      - name: Upload Android Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-artifacts
          retention-days: 1
          path: |
            build/app/outputs/flutter-apk/app-release.apk
            build/app/outputs/bundle/release/app-release.aab

  build-ios:
    name: Build iOS
    needs: [route, flutter-format, flutter-analyze, flutter-test]
    if: ${{ needs.route.outputs.run_build == 'true' }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get

      - name: Build unsigned iOS app
        run: flutter build ios --release --no-codesign

      - name: Zip iOS payload
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r mlocate_explorer-ios-unsigned.ipa Payload

      # SIGNED PATHWAY (commented out as requested)
      # - name: Build signed iOS ipa
      #   run: flutter build ipa --release --export-options-plist=ios/ExportOptions.plist
      #
      # - name: Upload signed IPA
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: ios-artifacts-signed
      #     retention-days: 1
      #     path: build/ios/ipa/*.ipa

      - name: Upload unsigned iOS Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-artifacts
          retention-days: 1
          path: mlocate_explorer-ios-unsigned.ipa

  build-deploy-web:
    name: Build & Deploy Web
    needs: [route, flutter-format, flutter-analyze, flutter-test]
    runs-on: ubuntu-latest
    if: needs.route.outputs.run_release == 'true' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter build web --release --base-href /mlocate_explorer/

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'build/web'
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  publish-release:
    name: Publish GitHub Release
    needs: [route, build-linux, build-windows, build-macos, build-android, build-ios]
    if: ${{ needs.route.outputs.run_release == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        if: github.event_name == 'workflow_dispatch'

      - name: Collect artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-release
          merge-multiple: true

      - name: Display structure of downloaded files
        run: ls -R dist-release

      - name: Determine tag name
        id: get_version
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag_name=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | tr -d '\r')
            VERSION=${VERSION%-next*}
            echo "tag_name=v$VERSION" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine discussion category
        id: discussion
        if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          repo_info=$(gh repo view --json owner,name,hasDiscussionsEnabled --jq '.owner.login + " " + .name + " " + (.hasDiscussionsEnabled|tostring)' || echo "")
          if [ -n "$repo_info" ]; then
            owner=${repo_info%% *}
            rest=${repo_info#* }
            name=${rest%% *}
            enabled=${rest#* }
            if [ "$enabled" = "true" ]; then
              categories=$(gh api graphql -F owner="$owner" -F name="$name" -f query='
                query($owner: String!, $name: String!) {
                  repository(owner: $owner, name: $name) {
                    discussionCategories(first: 10) {
                      nodes {
                        name
                      }
                    }
                  }
                }' --jq '.data.repository.discussionCategories.nodes[].name')
              if echo "$categories" | grep -q "^Announcements$"; then
                echo "category=Announcements" >> "$GITHUB_OUTPUT"
              elif echo "$categories" | grep -q "^General$"; then
                echo "category=General" >> "$GITHUB_OUTPUT"
              fi
            fi
          fi

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.tag_name || github.ref_name }}
          draft: false
          generate_release_notes: true
          discussion_category_name: ${{ steps.discussion.outputs.category }}
          files: dist-release/**
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  prepare-next-version-pr:
    name: Prepare next development iteration PR
    needs: [route, publish-release]
    if: always() && needs.route.outputs.run_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Bump to next version and open PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          # Fetch tags to ensure we have the latest tag
          git fetch --tags

          if [[ "${GITHUB_REF_NAME}" == v* ]]; then
            # Extract the tag version if triggered by a tag
            TAG_VERSION=${GITHUB_REF_NAME#v}
          else
            # Otherwise, use the latest tag (e.g. for workflow_dispatch)
            LATEST_TAG=$(git describe --tags --abbrev=0)
            TAG_VERSION=${LATEST_TAG#v}
          fi

          # Get the current version in pubspec.yaml
          CURRENT_VERSION=$(grep 'version: ' pubspec.yaml | sed 's/version: //' | tr -d '\r')

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          BRANCH="bump-version-$TAG_VERSION"
          git checkout -b "$BRANCH"

          # 1. Update pubspec.yaml to match the tag version (remove -next if present)
          sed -i "s/version: $CURRENT_VERSION/version: $TAG_VERSION/" pubspec.yaml
          git add pubspec.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Release $TAG_VERSION"
            git tag -f "v$TAG_VERSION"
            git push -f origin "v$TAG_VERSION"
          fi

          # 2. Calculate the next version
          BASE_VERSION=$(echo "$TAG_VERSION" | cut -d '+' -f 1 | cut -d '-' -f 1)
          if [[ "$TAG_VERSION" == *"+"* ]]; then
            BUILD_NUM=$(echo "$TAG_VERSION" | cut -d '+' -f 2)
          else
            BUILD_NUM="1"
          fi

          MAJOR=$(echo "$BASE_VERSION" | cut -d '.' -f 1)
          MINOR=$(echo "$BASE_VERSION" | cut -d '.' -f 2)
          PATCH=$(echo "$BASE_VERSION" | cut -d '.' -f 3)

          NEXT_PATCH=$((PATCH + 1))
          NEXT_BUILD=$((BUILD_NUM + 1))

          NEXT_VERSION="${MAJOR}.${MINOR}.${NEXT_PATCH}-next+${NEXT_BUILD}"

          # Update pubspec.yaml to the next version
          sed -i "s/version: $TAG_VERSION/version: $NEXT_VERSION/" pubspec.yaml
          git add pubspec.yaml
          if ! git diff --cached --quiet; then
            git commit -m "Prepare next development iteration $NEXT_VERSION"
          fi

          # Push to the new branch and create PR against main
          if [ $(git rev-list --count HEAD ^main) -gt 0 ]; then
            git push --force -u origin "$BRANCH"
            gh pr create --title "Prepare next development iteration $NEXT_VERSION" --body "Automated PR for next iteration after release." --base main --head "$BRANCH"
          else
            echo "No new commits, skipping PR creation."
          fi
